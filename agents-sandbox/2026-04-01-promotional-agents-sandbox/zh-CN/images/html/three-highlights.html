<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="shared-style.css">
<style>
  :root { --ave-body-padding: 40px 32px; }

  .container {
    max-width: 900px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .card {
    border-radius: var(--ave-card-radius);
    padding: 24px 28px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }
  .card:nth-child(1) {
    background: rgba(235, 250, 240, 0.75);
    border: 2px solid rgba(52, 168, 83, 0.3);
  }
  .card:nth-child(2) {
    background: rgba(233, 238, 255, 0.75);
    border: 2px solid rgba(29, 78, 216, 0.3);
  }
  .card:nth-child(3) {
    background: rgba(255, 243, 235, 0.75);
    border: 2px solid rgba(232, 113, 26, 0.3);
  }
  .icon-wrap {
    flex-shrink: 0;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }
  .card:nth-child(1) .icon-wrap { background: rgba(52, 168, 83, 0.15); }
  .card:nth-child(2) .icon-wrap { background: rgba(29, 78, 216, 0.15); }
  .card:nth-child(3) .icon-wrap { background: rgba(232, 113, 26, 0.15); }
  .text h3 {
    margin: 0 0 6px 0;
    font-size: 34px;
    font-weight: 400;
    -webkit-text-stroke: 0.8px var(--ave-text-primary);
    color: var(--ave-text-primary);
    line-height: 1.3;
  }
  .text p {
    margin: 0;
    font-size: var(--ave-body-size);
    color: var(--ave-text-muted);
    line-height: 1.6;
  }
  .text .cmd {
    display: inline-block;
    background: rgba(0, 0, 0, 0.06);
    padding: 2px 10px;
    border-radius: 6px;
    font-family: var(--ave-font-family-mono);
    font-size: 17px;
    color: var(--ave-text-secondary);
  }
  .text .highlight {
    -webkit-text-stroke: 0.3px var(--ave-text-primary);
    color: var(--ave-text-primary);
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="icon-wrap">💻</div>
    <div class="text">
      <h3>摆脱独立的 Mac Mini</h3>
      <p>不需要再为 Agent 单独准备一台机器。你现有的笔记本就够了，沙箱提供的隔离等级不亚于一台独立主机或虚拟机。</p>
    </div>
  </div>
  <div class="card">
    <div class="icon-wrap">🛡️</div>
    <div class="text">
      <h3>隔离效果等同于独立主机</h3>
      <p>每个沙箱有独立的文件系统、网络栈和进程空间。跟在远程服务器上跑没有区别，只是<span class="highlight">零延迟、零成本、数据不出本机</span>。</p>
    </div>
  </div>
  <div class="card">
    <div class="icon-wrap">🚀</div>
    <div class="text">
      <h3>订阅用户开箱即用，一键启动</h3>
      <p>已有 Claude Code 或 Codex 订阅？安装后一条命令启动：<span class="cmd">agbox agent claude</span>。不需要 API Key，不需要额外配置，<span class="highlight">你已有的订阅就是全部前置条件</span>。</p>
    </div>
  </div>
</div>
</body>
</html>
