<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="shared-style.css">
<style>
  .container { max-width: 640px; width: 100%; }
  .title-card { text-align: center; margin-bottom: 8px; }
  .title-card span {
    display: inline-block; font-size: var(--ave-title-size); -webkit-text-stroke: 0.6px var(--ave-text-primary);
    color: var(--ave-text-primary); background: var(--ave-card-bg);
    padding: 14px 36px; border-radius: 14px;
  }
  .subtitle-wrap { text-align: center; margin-bottom: 6px; }
  .subtitle {
    display: inline-block; font-size: 23px; color: var(--ave-text-secondary);
    background: var(--ave-card-bg-light); padding: 6px 20px; border-radius: 10px;
  }

  .cycle-wrap {
    position: relative;
    width: 560px;
    height: 560px;
    margin: -28px auto 0;
    transform: scale(1.10);
    transform-origin: top center;
  }

  /* Icon nodes on ring with colored backgrounds */
  .icon-node {
    position: absolute;
    width: 68px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    border-radius: 50%;
    z-index: 2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  /* Per-node colors */
  .icon-node.top    { left: 246px; top: 106px; background: rgba(52,168,83, 0.75); }
  .icon-node.right  { left: 386px; top: 246px; background: rgba(91,155,213, 0.75); }
  .icon-node.bottom { left: 246px; top: 386px; background: rgba(244,180,0, 0.75); }
  .icon-node.left   { left: 106px; top: 246px; background: rgba(232,113,26, 0.75); }

  /* Labels */
  .label-node {
    position: absolute;
    font-size: 23px;
    color: var(--ave-text-secondary);
    -webkit-text-stroke: 0.3px var(--ave-text-secondary);
    background: rgba(245, 243, 240, 0.75);
    padding: 5px 14px;
    border-radius: 8px;
    white-space: nowrap;
    z-index: 2;
  }
  .label-node.top    { left: 280px; top: 52px; transform: translateX(-50%); }
  .label-node.right  { left: 462px; top: 260px; }
  .label-node.bottom { left: 280px; top: 462px; transform: translateX(-50%); }
  .label-node.left   { right: calc(100% - 100px); top: 260px; }

  /* Center circle */
  .center-circle {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: var(--ave-card-bg);
    top: 200px;
    left: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 2;
    padding: 10px;
    box-sizing: border-box;
  }
  .center-circle .line1 {
    font-size: 23px;
    -webkit-text-stroke: 0.4px var(--ave-text-primary);
    color: var(--ave-text-primary);
    margin-bottom: 4px;
  }
  .center-circle .line2 {
    font-size: 18px;
    color: #555;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title-card"><span>场景三：CI 沙箱构建周期</span></div>
  <div class="subtitle-wrap">
    <div class="subtitle">agents-sandbox 让每次构建都是干净的起点</div>
  </div>

  <div class="cycle-wrap">
    <svg width="560" height="560" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;">
      <defs>
        <marker id="ah" markerWidth="7" markerHeight="6" refX="1" refY="3" orient="auto">
          <polygon points="0 0.5, 7 3, 0 5.5" fill="#999"/>
        </marker>
      </defs>
      <circle cx="280" cy="280" r="140" fill="rgba(200,200,200,0.06)"/>
      <path d="M 339 153 A 140 140 0 0 1 407 221"
            fill="none" stroke="#999" stroke-width="3" stroke-linecap="round" marker-end="url(#ah)"/>
      <path d="M 407 339 A 140 140 0 0 1 339 407"
            fill="none" stroke="#999" stroke-width="3" stroke-linecap="round" marker-end="url(#ah)"/>
      <path d="M 221 407 A 140 140 0 0 1 153 339"
            fill="none" stroke="#999" stroke-width="3" stroke-linecap="round" marker-end="url(#ah)"/>
      <path d="M 153 221 A 140 140 0 0 1 221 153"
            fill="none" stroke="#999" stroke-width="3" stroke-linecap="round" marker-end="url(#ah)"/>
    </svg>

    <div class="icon-node top">📦</div>
    <div class="icon-node right">🔨</div>
    <div class="icon-node bottom">📤</div>
    <div class="icon-node left">🗑️</div>

    <div class="label-node top">创建沙箱</div>
    <div class="label-node right">构建和测试</div>
    <div class="label-node bottom">提取结果</div>
    <div class="label-node left">销毁沙箱</div>

    <div class="center-circle">
      <div class="line1">×N 次循环</div>
      <div class="line2">零残留<br>每次都是干净的起点</div>
    </div>
  </div>
</div>
</body>
</html>
