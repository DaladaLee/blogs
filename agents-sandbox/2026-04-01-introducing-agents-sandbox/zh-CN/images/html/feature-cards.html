<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="shared-style.css">
<style>
  /* Layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 900px;
    width: 100%;
  }
  .card {
    border-radius: var(--ave-card-radius);
    padding: 28px;
  }
  /* Per-card colors — each card has its own palette */
  .card:nth-child(1) { background: rgba(235,250,240, 0.75); border: 2px solid rgba(52,168,83,0.25); }
  .card:nth-child(2) { background: rgba(233,238,255, 0.75); border: 2px solid rgba(29,78,216,0.25); }
  .card:nth-child(3) { background: rgba(243,237,255, 0.75); border: 2px solid rgba(139,92,246,0.25); }
  .card:nth-child(4) { background: rgba(255,243,235, 0.75); border: 2px solid rgba(232,113,26,0.25); }
  .card:nth-child(5) { background: rgba(232,250,255, 0.75); border: 2px solid rgba(6,182,212,0.25); }
  .card:nth-child(6) { background: rgba(253,238,248, 0.75); border: 2px solid rgba(236,72,153,0.25); }
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }
  .icon {
    flex-shrink: 0;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }
  .card h3 {
    color: var(--ave-text-primary);
    font-size: 34px;
    font-weight: 400;
    -webkit-text-stroke: 0.8px var(--ave-text-primary);
    margin: 0;
    line-height: 1.2;
  }
  .card p {
    color: var(--ave-text-muted);
    font-size: var(--ave-body-size);
    font-weight: 400;
    line-height: 1.6;
    margin: 0;
  }
</style>
</head>
<body>
<div class="grid">
  <div class="card">
    <div class="header">
      <div class="icon" style="background:rgba(52,168,83,0.15);">🛡️</div>
      <h3>宿主机安全</h3>
    </div>
    <p>无法访问宿主文件系统和网络。误操作只毁掉一次性沙箱，宿主不受任何影响。</p>
  </div>
  <div class="card">
    <div class="header">
      <div class="icon" style="background:rgba(29,78,216,0.15);">🔓</div>
      <h3>Agent 全速运行</h3>
    </div>
    <p>装任何东西、跑任何命令、删任何文件。零审批弹窗，直接交付结果。</p>
  </div>
  <div class="card">
    <div class="header">
      <div class="icon" style="background:rgba(139,92,246,0.15);">💳</div>
      <h3>复用已有订阅</h3>
    </div>
    <p>宿主认证和 CLI 订阅（Claude Max、Codex）直接带入沙箱，零额外成本。</p>
  </div>
  <div class="card">
    <div class="header">
      <div class="icon" style="background:rgba(232,113,26,0.15);">⚡</div>
      <h3>一条命令启动</h3>
    </div>
    <p>agbox agent claude 或 agbox agent codex，全权限运行。</p>
  </div>
  <div class="card">
    <div class="header">
      <div class="icon" style="background:rgba(6,182,212,0.15);">🔒</div>
      <h3>数据不出本机</h3>
    </div>
    <p>代码、凭据、所有 Agent 活动全部留在本地。</p>
  </div>
  <div class="card">
    <div class="header">
      <div class="icon" style="background:rgba(236,72,153,0.15);">💻</div>
      <h3>不需要 Mac Mini</h3>
    </div>
    <p>笔记本上有 Docker 就够了。</p>
  </div>
</div>
</body>
</html>
